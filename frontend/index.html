<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI客服员工</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .page { display: none; }
        .page.active { display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .msg-bubble { max-width: 80%; word-wrap: break-word; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .avatar-initial { display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; }
        input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(99,102,241,0.3); }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden">
    <!-- App Container -->
    <div id="app" class="h-full flex flex-col max-w-lg mx-auto bg-white relative">

        <!-- Page: Conversations List (Home) -->
        <div id="page-home" class="page active h-full">
            <div class="flex items-center justify-between px-4 py-3 bg-white border-b border-slate-100">
                <h1 class="text-xl font-bold text-slate-800">AI客服</h1>
                <button onclick="showAddStaffModal()" class="w-9 h-9 bg-indigo-500 text-white rounded-full flex items-center justify-center text-xl hover:bg-indigo-600 transition-colors shadow-sm">+</button>
            </div>
            <div id="conversation-list" class="flex-1 overflow-y-auto px-4 py-2">
                <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-400">
                    <svg class="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    <p class="text-sm">还没有客服员工</p>
                    <p class="text-xs mt-1">点击右上角 + 创建第一个客服员工</p>
                </div>
            </div>
        </div>

        <!-- Page: Chat Window -->
        <div id="page-chat" class="page h-full bg-slate-50">
            <div class="flex items-center px-3 py-3 bg-white border-b border-slate-100 shadow-sm">
                <button onclick="goHome()" class="w-8 h-8 flex items-center justify-center text-slate-600 hover:text-slate-800 mr-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div id="chat-avatar" class="w-8 h-8 rounded-full avatar-initial text-sm mr-2"></div>
                <div class="flex-1">
                    <h2 id="chat-staff-name" class="font-semibold text-slate-800 text-sm"></h2>
                    <p id="chat-staff-role" class="text-xs text-slate-400 truncate"></p>
                </div>
            </div>
            <div id="chat-messages" class="chat-messages px-4 py-4 space-y-3"></div>
            <div class="bg-white border-t border-slate-100 px-3 py-2 flex items-end gap-2">
                <textarea id="chat-input" rows="1" placeholder="输入消息..." class="flex-1 resize-none border border-slate-200 rounded-xl px-3 py-2 text-sm focus:border-indigo-400 max-h-24" onkeydown="handleChatKeydown(event)"></textarea>
                <button onclick="sendMessage()" class="w-9 h-9 bg-indigo-500 text-white rounded-full flex items-center justify-center hover:bg-indigo-600 transition-colors flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                </button>
            </div>
        </div>

        <!-- Page: Settings -->
        <div id="page-settings" class="page h-full">
            <div class="px-4 py-3 bg-white border-b border-slate-100">
                <h1 class="text-xl font-bold text-slate-800">系统设置</h1>
            </div>
            <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
                <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100">
                    <h3 class="font-semibold text-slate-700 mb-3 text-sm">AI模型配置</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="text-xs text-slate-500 mb-1 block">API Key</label>
                            <input id="setting-api-key" type="password" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="输入 API Key">
                        </div>
                        <div>
                            <label class="text-xs text-slate-500 mb-1 block">模型 ID</label>
                            <input id="setting-model-id" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="输入模型 ID">
                        </div>
                        <div>
                            <label class="text-xs text-slate-500 mb-1 block">API Base URL</label>
                            <input id="setting-api-url" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="输入 API 地址">
                        </div>
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-indigo-500 text-white rounded-xl py-3 font-medium text-sm hover:bg-indigo-600 transition-colors">保存设置</button>
                <div id="settings-toast" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-lg text-sm shadow-lg z-50">设置已保存</div>
            </div>
        </div>

        <!-- Page: Profile -->
        <div id="page-profile" class="page h-full">
            <div class="px-4 py-3 bg-white border-b border-slate-100">
                <h1 class="text-xl font-bold text-slate-800">我的</h1>
            </div>
            <div class="flex-1 overflow-y-auto">
                <div class="flex flex-col items-center py-8">
                    <div class="w-20 h-20 bg-gradient-to-br from-indigo-400 to-purple-500 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg">A</div>
                    <h2 class="mt-4 text-lg font-bold text-slate-800">管理员</h2>
                    <p class="text-sm text-slate-400">AI客服员工系统</p>
                </div>
                <div class="px-4 space-y-2">
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 flex items-center">
                        <svg class="w-5 h-5 text-indigo-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <div><p class="text-sm font-medium text-slate-700">客服员工数</p><p id="profile-staff-count" class="text-xs text-slate-400">0 个</p></div>
                    </div>
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 flex items-center">
                        <svg class="w-5 h-5 text-green-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        <div><p class="text-sm font-medium text-slate-700">对话总数</p><p id="profile-conv-count" class="text-xs text-slate-400">0 个</p></div>
                    </div>
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 flex items-center">
                        <svg class="w-5 h-5 text-amber-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <div><p class="text-sm font-medium text-slate-700">版本</p><p class="text-xs text-slate-400">v1.0.0</p></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Staff Modal -->
        <div id="modal-add-staff" class="hidden fixed inset-0 z-50 flex items-end justify-center">
            <div class="modal-overlay absolute inset-0" onclick="hideAddStaffModal()"></div>
            <div class="relative bg-white w-full max-w-lg rounded-t-2xl p-5 pb-8 fade-in max-h-[85vh] overflow-y-auto">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-slate-800">添加客服员工</h3>
                    <button onclick="hideAddStaffModal()" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="text-sm font-medium text-slate-600 mb-1 block">员工名称 *</label>
                        <input id="staff-name" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm" placeholder="如：小美、售前顾问">
                    </div>
                    <div>
                        <label class="text-sm font-medium text-slate-600 mb-1 block">角色描述 *</label>
                        <input id="staff-role" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm" placeholder="如：专业热情的售前顾问">
                    </div>
                    <div>
                        <label class="text-sm font-medium text-slate-600 mb-1 block">知识库内容</label>
                        <textarea id="staff-knowledge" rows="5" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm" placeholder="每行一个FAQ或知识条目，如：&#10;Q: 你们的产品多少钱？&#10;A: 基础版99元/月，专业版299元/月"></textarea>
                    </div>
                    <button onclick="createStaff()" class="w-full bg-indigo-500 text-white rounded-xl py-3 font-medium text-sm hover:bg-indigo-600 transition-colors">创建员工</button>
                </div>
            </div>
        </div>

        <!-- Bottom Tab Bar -->
        <div id="tab-bar" class="flex bg-white border-t border-slate-200 py-1 pb-2 flex-shrink-0">
            <button onclick="switchTab('home')" id="tab-home" class="flex-1 flex flex-col items-center py-1 text-indigo-500">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M8 10h.01M12 10h.01M16 10h.01" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                <span class="text-xs mt-0.5 font-medium">对话</span>
            </button>
            <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 flex flex-col items-center py-1 text-slate-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="text-xs mt-0.5">设置</span>
            </button>
            <button onclick="switchTab('profile')" id="tab-profile" class="flex-1 flex flex-col items-center py-1 text-slate-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span class="text-xs mt-0.5">我的</span>
            </button>
        </div>
    </div>

    <script>
        // State
        let currentTab = 'home';
        let currentStaffId = null;
        let currentConvId = null;
        let currentSessionId = null;
        let staffList = [];
        let conversations = [];

        // API Base
        const API_BASE = '/api';

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadConversations();
            loadStaff();
            loadSettings();

            // Register SW
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
            }
        });

        // Tab switching
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('#tab-bar button').forEach(b => {
                b.classList.remove('text-indigo-500');
                b.classList.add('text-slate-400');
            });

            const tabBtn = document.getElementById('tab-' + tab);
            tabBtn.classList.remove('text-slate-400');
            tabBtn.classList.add('text-indigo-500');

            const page = document.getElementById('page-' + tab);
            page.classList.add('active');

            if (tab === 'home') loadConversations();
            if (tab === 'settings') loadSettings();
            if (tab === 'profile') loadProfileStats();
        }

        // Go home from chat
        function goHome() {
            document.getElementById('page-chat').classList.remove('active');
            document.getElementById('page-home').classList.add('active');
            document.getElementById('tab-bar').classList.remove('hidden');
            currentStaffId = null;
            currentConvId = null;
            loadConversations();
        }

        // Load conversations
        async function loadConversations() {
            try {
                const res = await fetch(API_BASE + '/conversations');
                conversations = await res.json();
                renderConversations();
            } catch (e) {
                console.error('Load conversations error:', e);
            }
        }

        // Render conversations
        function renderConversations() {
            const list = document.getElementById('conversation-list');
            const empty = document.getElementById('empty-state');

            if (conversations.length === 0) {
                list.innerHTML = '';
                list.appendChild(empty);
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');

            // Get staff map
            const staffMap = {};
            staffList.forEach(s => staffMap[s.id] = s);

            let html = '';
            conversations.forEach(conv => {
                const staff = staffMap[conv.staff_id] || {};
                const name = conv.staff_name || staff.name || '未知员工';
                const color = conv.avatar_color || staff.avatar_color || '#6366f1';
                const initial = name.charAt(0);
                const lastMsg = conv.last_message || '暂无消息';
                const time = conv.created_at ? new Date(conv.created_at).toLocaleString('zh-CN', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';

                html += `
                <div onclick="openChat(${conv.id}, ${conv.staff_id}, '${conv.session_id}')" class="flex items-center px-3 py-3 rounded-xl hover:bg-slate-50 active:bg-slate-100 transition-colors cursor-pointer mb-1">
                    <div class="w-11 h-11 rounded-full avatar-initial flex-shrink-0 text-sm" style="background:${color}">${initial}</div>
                    <div class="ml-3 flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <span class="font-medium text-sm text-slate-800">${name}</span>
                            <span class="text-xs text-slate-400">${time}</span>
                        </div>
                        <p class="text-xs text-slate-400 truncate mt-0.5">${lastMsg}</p>
                    </div>
                </div>`;
            });

            list.innerHTML = html;
            list.appendChild(empty);
        }

        // Load staff list
        async function loadStaff() {
            try {
                const res = await fetch(API_BASE + '/staff');
                staffList = await res.json();
            } catch (e) {
                console.error('Load staff error:', e);
            }
        }

        // Open chat
        async function openChat(convId, staffId, sessionId) {
            currentConvId = convId;
            currentStaffId = staffId;
            currentSessionId = sessionId;

            // Find staff
            const staff = staffList.find(s => s.id === staffId);
            if (staff) {
                document.getElementById('chat-staff-name').textContent = staff.name;
                document.getElementById('chat-staff-role').textContent = staff.role_description;
                const avatar = document.getElementById('chat-avatar');
                avatar.style.background = staff.avatar_color || '#6366f1';
                avatar.textContent = staff.name.charAt(0);
            }

            // Load messages
            try {
                const res = await fetch(API_BASE + '/conversations/' + convId);
                const conv = await res.json();
                renderMessages(conv.messages || []);
            } catch (e) {
                console.error('Load messages error:', e);
                renderMessages([]);
            }

            document.getElementById('page-home').classList.remove('active');
            document.getElementById('page-chat').classList.add('active');
            document.getElementById('tab-bar').classList.add('hidden');

            // Scroll to bottom
            setTimeout(scrollToBottom, 100);
        }

        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('chat-messages');
            let html = '';
            messages.forEach(msg => {
                if (msg.role === 'user') {
                    html += `<div class="flex justify-end fade-in"><div class="msg-bubble bg-indigo-500 text-white rounded-2xl rounded-br-md px-4 py-2.5 text-sm shadow-sm">${escapeHtml(msg.content)}</div></div>`;
                } else {
                    html += `<div class="flex justify-start fade-in"><div class="msg-bubble bg-white text-slate-700 rounded-2xl rounded-bl-md px-4 py-2.5 text-sm shadow-sm border border-slate-100">${escapeHtml(msg.content)}</div></div>`;
                }
            });
            container.innerHTML = html;
            scrollToBottom();
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message || !currentStaffId) return;

            input.value = '';
            input.style.height = 'auto';

            // Add user message to UI
            const container = document.getElementById('chat-messages');
            container.innerHTML += `<div class="flex justify-end fade-in"><div class="msg-bubble bg-indigo-500 text-white rounded-2xl rounded-br-md px-4 py-2.5 text-sm shadow-sm">${escapeHtml(message)}</div></div>`;
            scrollToBottom();

            // Show typing indicator
            const typingId = 'typing-' + Date.now();
            container.innerHTML += `<div id="${typingId}" class="flex justify-start fade-in"><div class="msg-bubble bg-white text-slate-400 rounded-2xl rounded-bl-md px-4 py-2.5 text-sm shadow-sm border border-slate-100">思考中...</div></div>`;
            scrollToBottom();

            try {
                const res = await fetch(API_BASE + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        staff_id: currentStaffId,
                        session_id: currentSessionId,
                        message: message
                    })
                });
                const data = await res.json();

                // Remove typing indicator
                document.getElementById(typingId)?.remove();

                // Add AI reply
                container.innerHTML += `<div class="flex justify-start fade-in"><div class="msg-bubble bg-white text-slate-700 rounded-2xl rounded-bl-md px-4 py-2.5 text-sm shadow-sm border border-slate-100">${escapeHtml(data.reply)}</div></div>`;
                scrollToBottom();
            } catch (e) {
                document.getElementById(typingId)?.remove();
                container.innerHTML += `<div class="flex justify-start fade-in"><div class="msg-bubble bg-red-50 text-red-500 rounded-2xl rounded-bl-md px-4 py-2.5 text-sm shadow-sm border border-red-100">发送失败，请重试</div></div>`;
                scrollToBottom();
            }
        }

        // Chat input keydown
        function handleChatKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
            // Auto resize textarea
            const el = e.target;
            setTimeout(() => {
                el.style.height = 'auto';
                el.style.height = Math.min(el.scrollHeight, 96) + 'px';
            }, 0);
        }

        // Scroll to bottom
        function scrollToBottom() {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }

        // Show/hide add staff modal
        function showAddStaffModal() {
            document.getElementById('modal-add-staff').classList.remove('hidden');
        }
        function hideAddStaffModal() {
            document.getElementById('modal-add-staff').classList.add('hidden');
        }

        // Create staff
        async function createStaff() {
            const name = document.getElementById('staff-name').value.trim();
            const role = document.getElementById('staff-role').value.trim();
            const knowledge = document.getElementById('staff-knowledge').value.trim();

            if (!name || !role) {
                alert('请填写员工名称和角色描述');
                return;
            }

            try {
                const res = await fetch(API_BASE + '/staff', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        role_description: role,
                        knowledge_base: knowledge
                    })
                });
                const data = await res.json();

                // Create initial conversation
                const sessionId = 'session-' + Date.now();
                const convRes = await fetch(API_BASE + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        staff_id: data.id,
                        session_id: sessionId,
                        message: '你好！'
                    })
                });

                hideAddStaffModal();
                document.getElementById('staff-name').value = '';
                document.getElementById('staff-role').value = '';
                document.getElementById('staff-knowledge').value = '';

                await loadStaff();
                await loadConversations();
            } catch (e) {
                alert('创建失败: ' + e.message);
            }
        }

        // Settings
        async function loadSettings() {
            try {
                const res = await fetch(API_BASE + '/settings');
                const data = await res.json();
                document.getElementById('setting-api-key').value = data.api_key || '';
                document.getElementById('setting-model-id').value = data.model_id || '';
                document.getElementById('setting-api-url').value = data.api_base_url || '';
            } catch (e) {
                console.error('Load settings error:', e);
            }
        }

        async function saveSettings() {
            try {
                await fetch(API_BASE + '/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: document.getElementById('setting-api-key').value.trim(),
                        model_id: document.getElementById('setting-model-id').value.trim(),
                        api_base_url: document.getElementById('setting-api-url').value.trim()
                    })
                });
                const toast = document.getElementById('settings-toast');
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 2000);
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        // Profile stats
        async function loadProfileStats() {
            try {
                const [staffRes, convRes] = await Promise.all([
                    fetch(API_BASE + '/staff'),
                    fetch(API_BASE + '/conversations')
                ]);
                const staff = await staffRes.json();
                const convs = await convRes.json();
                document.getElementById('profile-staff-count').textContent = staff.length + ' 个';
                document.getElementById('profile-conv-count').textContent = convs.length + ' 个';
            } catch (e) {
                console.error('Load profile stats error:', e);
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
