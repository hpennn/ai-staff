<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>智能体工作台</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="智能体工作台">
    <meta name="apple-mobile-web-app-title" content="智能体工作台">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
    <meta name="msapplication-TileImage" content="/icons/icon-144.png">
    <meta name="msapplication-TileColor" content="#6366f1">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .page { display: none; }
        .page.active { display: flex; flex-direction: column; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .skill-card { transition: all 0.2s ease; }
        .skill-card:active { transform: scale(0.96); }
        .slot-card { transition: all 0.2s ease; border: 2px dashed #cbd5e1; }
        .slot-card:active { transform: scale(0.96); border-color: #6366f1; }
        .tab-btn.active { color: #6366f1; }
        .tab-btn.active .tab-icon { background: #eef2ff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(99,102,241,0.3); }
        .msg-bubble { max-width: 80%; word-wrap: break-word; }
        .chat-messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .skill-detail-page { position: absolute; inset: 0; z-index: 40; background: white; display: none; flex-direction: column; }
        .skill-detail-page.active { display: flex; }
        .result-area { max-height: 40vh; overflow-y: auto; }
        @keyframes pulse-dot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .typing-dot { animation: pulse-dot 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden">

<div id="app" class="h-full flex flex-col max-w-lg mx-auto bg-white relative">

    <!-- Page: 工作台 -->
    <div id="page-home" class="page active h-full" style="padding-bottom: 140px;">
        <div class="flex items-center justify-between px-4 py-3 bg-white border-b border-slate-100 sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-lg flex items-center justify-center">
                    <span class="text-white text-sm font-bold">AI</span>
                </div>
                <h1 class="text-lg font-bold text-slate-800">智能体工作台</h1>
            </div>
            <button onclick="navigateTo('profile')" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-indigo-500 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto px-4 py-4">
            <div class="mb-5">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">预置技能</h2>
                    <span class="text-xs text-slate-400">6个可用</span>
                </div>
                <div class="grid grid-cols-2 gap-3" id="skills-grid"></div>
            </div>
            <div class="mb-4">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">自定义技能</h2>
                    <span class="text-xs text-indigo-500 cursor-pointer" onclick="showToast('更多技能即将上线！')">+ 添加</span>
                </div>
                <div class="grid grid-cols-3 gap-3" id="custom-slots"></div>
                <p class="text-center text-xs text-slate-400 mt-3">更多技能即将上线</p>
            </div>
        </div>
    </div>

    <!-- Page: 任务 -->
    <div id="page-tasks" class="page h-full" style="padding-bottom: 140px;">
        <div class="flex items-center justify-between px-4 py-3 bg-white border-b border-slate-100 sticky top-0 z-10">
            <h1 class="text-lg font-bold text-slate-800">任务记录</h1>
            <button onclick="clearTasks()" class="text-xs text-slate-400 hover:text-red-400 transition-colors">清空</button>
        </div>
        <div id="task-list" class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
            <div id="task-empty" class="flex flex-col items-center justify-center h-full">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-3">
                    <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                </div>
                <p class="text-sm text-slate-400">还没有任务记录</p>
                <p class="text-xs text-slate-300 mt-1">使用技能后会自动记录在这里</p>
            </div>
        </div>
    </div>

    <!-- Page: 对话 -->
    <div id="page-chat" class="page h-full" style="padding-bottom: 70px;">
        <div class="flex items-center px-4 py-3 bg-white border-b border-slate-100 sticky top-0 z-10">
            <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-full flex items-center justify-center mr-2">
                <span class="text-white text-xs font-bold">AI</span>
            </div>
            <div>
                <h2 class="font-semibold text-slate-800 text-sm">智能助手</h2>
                <p class="text-xs text-slate-400">自动匹配技能执行任务</p>
            </div>
        </div>
        <div id="chat-messages" class="chat-messages px-4 py-4 space-y-3">
            <div class="flex justify-start fade-in">
                <div class="msg-bubble bg-white text-slate-700 rounded-2xl rounded-bl-md px-4 py-2.5 text-sm shadow-sm border border-slate-100">
                    👋 你好！我是你的智能助手。<br>你可以让我帮你写文档、处理表格、识别图片文字等。<br><span class="text-xs text-slate-400">试试输入你的需求，我会自动匹配技能来处理。</span>
                </div>
            </div>
        </div>
        <div class="bg-white border-t border-slate-100 px-3 py-2 flex items-end gap-2 sticky bottom-0">
            <button onclick="triggerFileUpload()" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-indigo-500 transition-colors flex-shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
            </button>
            <input type="file" id="chat-file-input" class="hidden" multiple onchange="handleFileAttach(event)">
            <textarea id="chat-input" rows="1" placeholder="告诉我你想做什么..." class="flex-1 resize-none border border-slate-200 rounded-xl px-3 py-2 text-sm focus:border-indigo-400 transition-colors" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}"></textarea>
            <button onclick="sendChatMessage()" class="w-9 h-9 bg-indigo-500 text-white rounded-full flex items-center justify-center hover:bg-indigo-600 transition-colors shadow-sm flex-shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            </button>
        </div>
    </div>

    <!-- Page: 我的 -->
    <div id="page-profile" class="page h-full" style="padding-bottom: 140px;">
        <div class="px-4 py-3 bg-white border-b border-slate-100 sticky top-0 z-10">
            <h1 class="text-lg font-bold text-slate-800">我的</h1>
        </div>
        <div class="flex-1 overflow-y-auto">
            <div class="px-4 py-6 flex items-center gap-4">
                <div class="w-16 h-16 bg-gradient-to-br from-indigo-400 to-purple-500 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg shadow-indigo-200">U</div>
                <div>
                    <p class="font-semibold text-slate-800">用户</p>
                    <p class="text-xs text-slate-400">免费版 · 已使用 0 次</p>
                </div>
            </div>
            <div class="px-4 space-y-1">
                <div onclick="showToast('接入渠道功能开发中')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                    <span class="text-lg">🔗</span><span class="flex-1 text-sm text-slate-700">接入渠道</span>
                    <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </div>
                <div onclick="showToast('知识库功能开发中')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                    <span class="text-lg">📚</span><span class="flex-1 text-sm text-slate-700">知识库</span>
                    <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </div>
                <div onclick="showToast('使用统计功能开发中')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                    <span class="text-lg">📊</span><span class="flex-1 text-sm text-slate-700">使用统计</span>
                    <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </div>
                <div onclick="showToast('当前已是最新版本 v2.1.0')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                    <span class="text-lg">ℹ️</span><span class="flex-1 text-sm text-slate-700">关于</span>
                    <span class="text-xs text-slate-400">v2.1.0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Skill Detail Page -->
    <div id="skill-detail" class="skill-detail-page">
        <div class="flex items-center px-4 py-3 bg-white border-b border-slate-100">
            <button onclick="closeSkillDetail()" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors mr-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div id="detail-header" class="flex items-center gap-2 flex-1"></div>
        </div>
        <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
            <div id="detail-input-area" class="space-y-3"></div>
            <button id="detail-exec-btn" onclick="executeSkill()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-medium rounded-xl py-3 text-sm transition-all shadow-sm active:scale-[0.98]">开始执行</button>
            <div id="detail-result-area" class="hidden">
                <h3 class="text-sm font-semibold text-slate-500 mb-2">执行结果</h3>
                <div id="detail-result" class="bg-slate-50 rounded-xl p-4 text-sm text-slate-700 result-area border border-slate-100"></div>
            </div>
            <div id="detail-history" class="hidden">
                <h3 class="text-sm font-semibold text-slate-500 mb-2">历史记录</h3>
                <div id="detail-history-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex items-center justify-around py-2 safe-bottom z-30">
        <button onclick="navigateTo('home')" class="tab-btn active flex flex-col items-center gap-0.5 px-4 py-1" data-tab="home">
            <span class="tab-icon w-8 h-8 rounded-xl flex items-center justify-center text-lg transition-colors">🏠</span>
            <span class="text-xs text-slate-500">工作台</span>
        </button>
        <button onclick="navigateTo('tasks')" class="tab-btn flex flex-col items-center gap-0.5 px-4 py-1" data-tab="tasks">
            <span class="tab-icon w-8 h-8 rounded-xl flex items-center justify-center text-lg transition-colors">📋</span>
            <span class="text-xs text-slate-500">任务</span>
        </button>
        <button onclick="navigateTo('chat')" class="tab-btn flex flex-col items-center gap-0.5 px-4 py-1" data-tab="chat">
            <span class="tab-icon w-8 h-8 rounded-xl flex items-center justify-center text-lg transition-colors">💬</span>
            <span class="text-xs text-slate-500">对话</span>
        </button>
        <button onclick="navigateTo('profile')" class="tab-btn flex flex-col items-center gap-0.5 px-4 py-1" data-tab="profile">
            <span class="tab-icon w-8 h-8 rounded-xl flex items-center justify-center text-lg transition-colors">👤</span>
            <span class="text-xs text-slate-500">我的</span>
        </button>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-800 text-white text-sm px-5 py-2.5 rounded-xl shadow-lg z-50 opacity-0 pointer-events-none transition-opacity duration-200"></div>

<script>
const PRESET_SKILLS = [
    { id: 'doc_generator', icon: '\u{1F4C4}', name: '文档生成', desc: 'Word/PDF/Markdown自动生成', color: 'from-blue-500 to-indigo-500', inputType: 'textarea', placeholder: '描述你要生成的文档内容...' },
    { id: 'spreadsheet', icon: '\u{1F4CA}', name: '表格处理', desc: 'Excel数据整理、公式、图表', color: 'from-green-500 to-emerald-500', inputType: 'file+text', placeholder: '上传Excel或描述数据需求...' },
    { id: 'image_processor', icon: '\u{1F5BC}\u{FE0F}', name: '图片处理', desc: '批量加水印、裁剪、格式转换', color: 'from-pink-500 to-rose-500', inputType: 'file', placeholder: '上传图片进行批量处理...' },
    { id: 'ocr', icon: '\u{1F50D}', name: 'OCR识别', desc: '图片\u2192文字、票据识别', color: 'from-amber-500 to-orange-500', inputType: 'file', placeholder: '上传图片进行文字识别...' },
    { id: 'data_extractor', icon: '\u{1F4C8}', name: '数据提取', desc: '图片中的表格/数据\u2192结构化输出', color: 'from-purple-500 to-violet-500', inputType: 'file', placeholder: '上传包含数据/表格的图片...' },
    { id: 'copywriter', icon: '\u{270D}\u{FE0F}', name: '文案生成', desc: '营销文案、公众号、小红书内容', color: 'from-cyan-500 to-teal-500', inputType: 'textarea', placeholder: '描述文案需求，如产品/风格/平台...' }
];

let taskHistory = JSON.parse(localStorage.getItem('ai_task_history') || '[]');
let skillHistory = {};
let currentSkillId = null;

function init() {
    renderSkillsGrid();
    renderCustomSlots();
    renderTaskList();
    loadSkillHistory();
}

function renderSkillsGrid() {
    const grid = document.getElementById('skills-grid');
    grid.innerHTML = PRESET_SKILLS.map(s => `
        <div class="skill-card bg-white rounded-2xl border border-slate-100 p-4 cursor-pointer hover:shadow-md hover:shadow-slate-100 hover:border-indigo-100 group" onclick="openSkillDetail('${s.id}')">
            <div class="w-10 h-10 bg-gradient-to-br ${s.color} rounded-xl flex items-center justify-center text-lg mb-3 shadow-sm group-hover:scale-110 transition-transform">${s.icon}</div>
            <h3 class="font-semibold text-slate-800 text-sm mb-0.5">${s.name}</h3>
            <p class="text-xs text-slate-400 mb-3 leading-relaxed">${s.desc}</p>
            <button class="w-full text-xs font-medium text-indigo-500 bg-indigo-50 hover:bg-indigo-100 rounded-lg py-1.5 transition-colors">使用</button>
        </div>
    `).join('');
}

function renderCustomSlots() {
    const container = document.getElementById('custom-slots');
    container.innerHTML = [0,1,2].map(i => `
        <div class="slot-card rounded-2xl p-4 flex flex-col items-center justify-center aspect-square cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/30" onclick="addCustomSlot(${i})">
            <svg class="w-6 h-6 text-slate-300 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span class="text-xs text-slate-400">添加技能</span>
        </div>
    `).join('');
}

function renderTaskList() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('task-empty');
    if (taskHistory.length === 0) {
        list.innerHTML = '';
        list.appendChild(empty);
        empty.style.display = '';
        return;
    }
    empty.style.display = 'none';
    list.innerHTML = taskHistory.slice().reverse().map(t => {
        const skill = PRESET_SKILLS.find(s => s.id === t.skillId);
        return `
        <div class="bg-white rounded-xl border border-slate-100 p-3 fade-in">
            <div class="flex items-center gap-2 mb-1.5">
                <span class="text-base">${skill ? skill.icon : '\u26A1'}</span>
                <span class="text-sm font-medium text-slate-700">${t.skillName}</span>
                <span class="ml-auto text-xs text-slate-400">${formatTime(t.time)}</span>
            </div>
            <p class="text-xs text-slate-500 line-clamp-2">${t.input || '自动匹配任务'}</p>
            <div class="flex items-center gap-2 mt-2">
                <span class="text-xs px-2 py-0.5 rounded-full ${t.status === 'success' ? 'bg-green-50 text-green-600' : 'bg-amber-50 text-amber-600'}">\u2713 完成</span>
            </div>
        </div>`;
    }).join('');
}

function loadSkillHistory() {
    try { skillHistory = JSON.parse(localStorage.getItem('ai_skill_history') || '{}'); } catch(e) { skillHistory = {}; }
}
function saveSkillHistory() { localStorage.setItem('ai_skill_history', JSON.stringify(skillHistory)); }

function navigateTo(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    if (tab === 'tasks') renderTaskList();
}

function openSkillDetail(skillId) {
    const skill = PRESET_SKILLS.find(s => s.id === skillId);
    if (!skill) return;
    currentSkillId = skillId;
    document.getElementById('detail-header').innerHTML = `
        <div class="w-8 h-8 bg-gradient-to-br ${skill.color} rounded-lg flex items-center justify-center text-sm shadow-sm">${skill.icon}</div>
        <div><h2 class="font-semibold text-slate-800 text-sm">${skill.name}</h2><p class="text-xs text-slate-400">${skill.desc}</p></div>
    `;
    const inputArea = document.getElementById('detail-input-area');
    if (skill.inputType === 'textarea') {
        inputArea.innerHTML = `<textarea id="skill-input-text" rows="4" placeholder="${skill.placeholder}" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm resize-none focus:border-indigo-400 transition-colors"></textarea>`;
    } else if (skill.inputType === 'file') {
        inputArea.innerHTML = `
            <div onclick="document.getElementById('skill-file-input').click()" class="border-2 border-dashed border-slate-200 rounded-xl p-6 text-center cursor-pointer hover:border-indigo-300 hover:bg-indigo-50/30 transition-colors">
                <svg class="w-8 h-8 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                <p class="text-sm text-slate-500">点击上传文件</p>
                <p class="text-xs text-slate-400 mt-1">支持图片、PDF等格式</p>
            </div>
            <input type="file" id="skill-file-input" class="hidden" multiple>
        `;
    } else {
        inputArea.innerHTML = `
            <div onclick="document.getElementById('skill-file-input').click()" class="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center cursor-pointer hover:border-indigo-300 hover:bg-indigo-50/30 transition-colors">
                <p class="text-sm text-slate-500">\u{1F4CE} 点击上传文件（可选）</p>
            </div>
            <input type="file" id="skill-file-input" class="hidden" multiple>
            <textarea id="skill-input-text" rows="3" placeholder="${skill.placeholder}" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm resize-none focus:border-indigo-400 transition-colors"></textarea>
        `;
    }
    document.getElementById('detail-result-area').classList.add('hidden');
    renderDetailHistory(skillId);
    document.getElementById('skill-detail').classList.add('active');
}

function closeSkillDetail() {
    document.getElementById('skill-detail').classList.remove('active');
    currentSkillId = null;
}

function renderDetailHistory(skillId) {
    const historyArea = document.getElementById('detail-history');
    const historyList = document.getElementById('detail-history-list');
    const records = skillHistory[skillId] || [];
    if (records.length === 0) { historyArea.classList.add('hidden'); return; }
    historyArea.classList.remove('hidden');
    historyList.innerHTML = records.slice(-5).reverse().map(r => `
        <div class="bg-slate-50 rounded-lg p-3 border border-slate-100">
            <p class="text-xs text-slate-600 mb-1">${r.input || '文件处理'}</p>
            <div class="flex items-center justify-between">
                <span class="text-xs text-green-600">\u2713 完成</span>
                <span class="text-xs text-slate-400">${formatTime(r.time)}</span>
            </div>
        </div>
    `).join('');
}

async function executeSkill() {
    if (!currentSkillId) return;
    const skill = PRESET_SKILLS.find(s => s.id === currentSkillId);
    const btn = document.getElementById('detail-exec-btn');
    const resultArea = document.getElementById('detail-result-area');
    const resultEl = document.getElementById('detail-result');
    const textInput = document.getElementById('skill-input-text');
    const inputText = textInput ? textInput.value.trim() : '';
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-flex items-center gap-1"><span class="typing-dot w-1.5 h-1.5 bg-white rounded-full"></span><span class="typing-dot w-1.5 h-1.5 bg-white rounded-full"></span><span class="typing-dot w-1.5 h-1.5 bg-white rounded-full"></span> 处理中...</span>';
    await new Promise(r => setTimeout(r, 1500 + Math.random() * 1000));
    resultArea.classList.remove('hidden');
    resultEl.innerHTML = getMockResult(skill.id, inputText);
    btn.disabled = false;
    btn.textContent = '开始执行';
    const record = { input: inputText || '文件处理', time: Date.now(), result: 'done' };
    if (!skillHistory[skill.id]) skillHistory[skill.id] = [];
    skillHistory[skill.id].push(record);
    saveSkillHistory();
    taskHistory.push({ skillId: skill.id, skillName: skill.name, input: inputText || '文件处理', time: Date.now(), status: 'success' });
    localStorage.setItem('ai_task_history', JSON.stringify(taskHistory));
    renderDetailHistory(skill.id);
}

function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    input.style.height = 'auto';
    addChatBubble('user', msg);
    const matchedSkill = matchSkill(msg);
    setTimeout(() => {
        addChatBubble('assistant', '正在为你匹配技能...', 'typing');
        setTimeout(() => {
            const typingEl = document.querySelector('#chat-messages .typing-msg');
            if (typingEl) typingEl.remove();
            if (matchedSkill) {
                addChatBubble('assistant', `已匹配到「${matchedSkill.name}」技能 \u{1F3AF}<br><span class="text-xs text-indigo-500 cursor-pointer" onclick="openSkillDetail('${matchedSkill.id}');navigateTo('home')">点击使用 \u2192</span>`);
            } else {
                addChatBubble('assistant', '我来理解一下你的需求...<br><span class="text-xs text-slate-400">目前支持：文档生成、表格处理、图片处理、OCR识别、数据提取、文案生成</span>');
            }
            taskHistory.push({ skillId: matchedSkill ? matchedSkill.id : 'chat', skillName: matchedSkill ? matchedSkill.name : '通用对话', input: msg, time: Date.now(), status: 'success' });
            localStorage.setItem('ai_task_history', JSON.stringify(taskHistory));
        }, 800);
    }, 300);
}

function addChatBubble(role, content, extraClass) {
    const c = document.getElementById('chat-messages');
    const d = document.createElement('div');
    d.className = 'flex ' + (role === 'user' ? 'justify-end' : 'justify-start') + ' fade-in' + (extraClass === 'typing' ? ' typing-msg' : '');
    if (role === 'user') {
        d.innerHTML = '<div class="msg-bubble bg-indigo-500 text-white rounded-2xl rounded-br-md px-4 py-2.5 text-sm shadow-sm">' + escapeHtml(content) + '</div>';
    } else {
        d.innerHTML = '<div class="msg-bubble bg-white text-slate-700 rounded-2xl rounded-bl-md px-4 py-2.5 text-sm shadow-sm border border-slate-100">' + content + '</div>';
    }
    c.appendChild(d);
    setTimeout(() => c.scrollTop = c.scrollHeight, 50);
}

function matchSkill(msg) {
    const keywords = {
        doc_generator: ['文档', '报告', '合同', 'word', 'pdf', 'markdown', '写作'],
        spreadsheet: ['表格', 'excel', '数据整理', '公式', '图表', 'xlsx', 'csv'],
        image_processor: ['图片', '水印', '裁剪', '格式转换', '批量处理', 'resize'],
        ocr: ['识别', '文字', 'ocr', '图片转文字', '票据', '扫描件'],
        data_extractor: ['提取', '数据提取', '表格数据', '结构化', '解析'],
        copywriter: ['文案', '营销', '小红书', '公众号', '推广', '种草', '标题']
    };
    const lower = msg.toLowerCase();
    for (const [skillId, kws] of Object.entries(keywords)) {
        if (kws.some(k => lower.includes(k))) return PRESET_SKILLS.find(s => s.id === skillId);
    }
    return null;
}

function addCustomSlot(index) { showToast('自定义技能功能即将上线'); }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function formatTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    return (d.getMonth() + 1) + '/' + d.getDate();
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2000);
}
function clearTasks() {
    taskHistory = [];
    localStorage.setItem('ai_task_history', '[]');
    renderTaskList();
    showToast('已清空任务记录');
}
function triggerFileUpload() { document.getElementById('chat-file-input').click(); }
function handleFileAttach(e) {
    const files = e.target.files;
    if (files.length > 0) {
        const names = Array.from(files).map(f => f.name).join(', ');
        addChatBubble('user', '\u{1F4CE} ' + names);
        setTimeout(() => addChatBubble('assistant', '文件已接收，正在分析...<br><span class="text-xs text-slate-400">即将为你匹配最合适的技能</span>'), 500);
    }
    e.target.value = '';
}
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
init();
</script>
